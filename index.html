<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MatchQuant 2</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b1323" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">MQ</div>
      <div>
        <div class="title">MatchQuant 2</div>
        <div class="subtitle">Offline football predictions (xG-style model)</div>
      </div>
    </div>

    <div class="right">
      <span id="netBadge" class="badge">…</span>
      <button id="installBtn" class="btn ghost" style="display:none;">Install</button>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>Match Setup</h2>

      <div class="grid">
        <div class="field">
          <label>League</label>
          <select id="leagueSelect"></select>
        </div>

        <div class="field">
          <label>Date (optional)</label>
          <input id="matchDate" type="date" />
        </div>

        <div class="field">
          <label>Home</label>
          <select id="homeSelect"></select>
        </div>

        <div class="field">
          <label>Away</label>
          <select id="awaySelect"></select>
        </div>
      </div>

      <div class="grid">
        <div class="field">
          <label>Market O/U line (optional)</label>
          <input id="ouLine" type="number" step="0.25" placeholder="2.5" />
        </div>

        <div class="field">
          <label>Asian Handicap line (optional)</label>
          <input id="ahLine" type="number" step="0.25" placeholder="-0.5 (home)" />
        </div>

        <div class="field">
          <label>3-way odds Home (optional)</label>
          <input id="oddsH" type="number" step="0.01" placeholder="1.90" />
        </div>

        <div class="field">
          <label>3-way odds Draw (optional)</label>
          <input id="oddsD" type="number" step="0.01" placeholder="3.40" />
        </div>

        <div class="field">
          <label>3-way odds Away (optional)</label>
          <input id="oddsA" type="number" step="0.01" placeholder="4.20" />
        </div>
      </div>

      <div class="row">
        <button id="runBtn" class="btn primary">Run Prediction</button>
        <button id="swapBtn" class="btn ghost">Swap</button>
        <button id="saveBtn" class="btn ghost">Save to History</button>
        <button id="resetBtn" class="btn ghost danger">Reset</button>
      </div>

      <p class="hint">
        Offline-ready. To improve accuracy, replace the JSON files in <code>/data</code> with your real tables.
      </p>
    </section>

    <section class="card">
      <h2>Output</h2>

      <div id="output" class="output">
        <div class="muted">Pick a league + teams and hit <b>Run Prediction</b>.</div>
      </div>
    </section>

    <section class="card">
      <h2>History</h2>
      <div class="row">
        <button id="exportBtn" class="btn ghost">Export JSON</button>
        <button id="clearHistoryBtn" class="btn ghost danger">Clear</button>
      </div>
      <div id="history" class="history"></div>
    </section>

    <footer class="footer">
      <span>MatchQuant 2 • Works offline after first load • PWA</span>
    </footer>
  </main>

  <script src="engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
